services:
  db:
    image: postgres:16-alpine
    container_name: pawboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pawboard
    ports:
      - '5432:5432'
    volumes:
      - pawboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d pawboard']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pawboard_pgdata:
